version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 6.0

  pre_build:
    commands:
      - echo "Restoring dependencies"
      - cd sample-api
      - dotnet restore

  build:
    commands:
      - echo "Publishing application"
      - dotnet publish -c Release -o publish

  post_build:
    commands:
      - echo "Preparing artifacts for CodeDeploy"
      - cd ..
      - cp -r sample-api/publish/* .
      - ls -la

artifacts:
  files:
    - '**/*'
  discard-paths: no
