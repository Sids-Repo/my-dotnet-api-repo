version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 6.0

  pre_build:
    commands:
      - echo "Restoring dependencies"
      - cd sample-api
      - dotnet restore

  build:
    commands:
      - echo "Publishing application to repo root"
      - dotnet publish -c Release -o ..

artifacts:
  files:
    - '**/*'
  discard-paths: no
